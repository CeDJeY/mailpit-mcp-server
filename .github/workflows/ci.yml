name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest
    services:
      mailpit:
        image: axllent/mailpit:latest
        ports:
          - 8025:8025
          - 1025:1025
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Seed a test message via Mailpit API
        run: |
          curl -sf -X POST http://localhost:8025/api/v1/send \
            -H 'Content-Type: application/json' \
            -d '{"From":{"Email":"ci@example.com"},"To":[{"Email":"dest@example.com"}],"Subject":"CI test","Text":"hello from CI"}'

      - name: Start MCP server (HTTP, auth enabled)
        run: |
          MAILPIT_URL=http://localhost:8025 MCP_AUTH_TOKEN=ci-token node server.js &
          for i in $(seq 1 20); do
            curl -sf http://localhost:3000/healthz && break
            sleep 0.5
          done

      - name: Reject requests without token
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://localhost:3000/mcp \
            -H 'Content-Type: application/json' \
            -d '{"jsonrpc":"2.0","method":"ping","id":1}')
          test "$code" = "401"

      - name: Run MCP client e2e test
        run: MCP_URL=http://localhost:3000/mcp MCP_AUTH_TOKEN=ci-token node mcp-test.js

      - name: Docker image builds
        run: docker build -t mailpit-mcp-server:ci .
